services:
  vite-dev:
    image: node:20-alpine
    container_name: vite-dev
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_PROXY_TARGET=http://host.docker.internal:8081
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
